<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" role="img" aria-labelledby="title desc">
  <title id="title">Distributed control icon</title>
  <desc id="desc">Four nodes connected as a single chain with uneven spacing.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8fbff" />
      <stop offset="100%" stop-color="#e8f0fb" />
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="400" height="400" fill="url(#bg)" />

  <g stroke="#9bb3cc" stroke-width="5" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <path d="M78 292 L144 208 L236 144 L330 110" />
  </g>

  <g fill="#2f6fb1">
    <circle cx="78" cy="292" r="18"/>
    <circle cx="144" cy="208" r="18"/>
    <circle cx="236" cy="144" r="18"/>
    <circle cx="330" cy="110" r="18"/>
  </g>

  <g stroke="#2c3e50" stroke-width="8" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <path d="M92 278 L128 232" />
    <path d="M160 195 L220 155" />
    <path d="M252 138 L314 116" />
  </g>
</svg>
