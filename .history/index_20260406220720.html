<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Native JS 3D Animation</title>
<style>
    body { margin: 0; background: black; }
</style>
</head>

<body>

<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>

<script>
// =====================
// PARAMETERS
// =====================
const L0 = 1;
const L1 = 1;

// =====================
// INPUT DATA (REPLACE)
// =====================
const thetaFrames = Array.from({length: 300}, (_, i) => 0.8 * Math.sin(i * 0.03));
const alphaFrames = Array.from({length: 300}, (_, i) => 0.6 * Math.cos(i * 0.03));

// =====================
// SCENE SETUP
// =====================
const scene = new THREE.Scene();

const camera = new THREE.PerspectiveCamera(
    60,
    window.innerWidth / window.innerHeight,
    0.1,
    100
);
camera.position.set(2, 0.5, 1);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setClearColor(0x000000);
document.body.appendChild(renderer.domElement);

// =====================
// AXES
// =====================
const axesMaterial = new THREE.LineBasicMaterial({ color: 0xffffff });

function createAxis(dir) {
    const points = [new THREE.Vector3(0,0,0), dir];
    const geometry = new THREE.BufferGeometry().setFromPoints(points);
    return new THREE.Line(geometry, axesMaterial);
}

scene.add(createAxis(new THREE.Vector3(1,0,0)));
scene.add(createAxis(new THREE.Vector3(0,1,0)));
scene.add(createAxis(new THREE.Vector3(0,0,1)));

// =====================
// ARM + PENDULUM
// =====================
const material = new THREE.LineBasicMaterial({ color: 0x66ccff });

function createLine() {
    const geometry = new THREE.BufferGeometry();
    const points = [new THREE.Vector3(), new THREE.Vector3()];
    geometry.setFromPoints(points);
    return new THREE.Line(geometry, material);
}

const arm = createLine();
const pendulum = createLine();

scene.add(arm);
scene.add(pendulum);

// =====================
// GEOMETRY FUNCTION
// =====================
function calculatePs(theta, s, alpha) {
    return new THREE.Vector3(
        L0*Math.cos(theta) + s*Math.sin(alpha)*Math.sin(theta),
        L0*Math.sin(theta) - s*Math.sin(alpha)*Math.cos(theta),
        s*Math.cos(alpha)
    );
}

// =====================
// ANIMATION LOOP
// =====================
let frame = 0;

function animate() {
    requestAnimationFrame(animate);

    const theta = thetaFrames[frame];
    const alpha = alphaFrames[frame];

    const origin = new THREE.Vector3(0,0,0);
    const armEnd = calculatePs(theta, 0, alpha);
    const pendulumEnd = calculatePs(theta, L1, alpha);

    // update arm
    arm.geometry.setFromPoints([origin, armEnd]);

    // update pendulum
    pendulum.geometry.setFromPoints([armEnd, pendulumEnd]);

    renderer.render(scene, camera);

    frame = (frame + 1) % thetaFrames.length;
}

animate();

// =====================
// RESIZE HANDLING
// =====================
window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>

</body>
</html>
