<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Arm + Pendulum (Stable)</title>

<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
<script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
<script src="qube_dynamics.js"></script>

<style>
body { margin:0; overflow:hidden; background:black; }
.headline {
    position:relative;
    color:white;
    font-size:24px;
    font-weight:600;
    margin:16px;
}
.app-layout {
    display:grid;
    grid-template-columns: 1fr 1fr;
    gap:12px;
    height:calc(100vh - 170px);
    padding:0 16px;
    box-sizing:border-box;
}
.panel {
    position:relative;
    border:1px solid #3a3a3a;
    border-radius:8px;
    overflow:hidden;
    background:#000;
}
#renderPanel canvas {
    display:block;
    width:100%;
    height:100%;
}
#phaseCanvas {
    width:100%;
    height:100%;
    display:block;
}
.label {
    position:absolute;
    color:white;
    font-size:18px;
    pointer-events:none;
}
.mode-panel {
    margin:12px 16px 0 16px;
    display:flex;
    justify-content:center;
    gap:8px;
    align-items:center;
}
.mode-panel button {
    background:#111;
    color:#fff;
    border:1px solid #777;
    border-radius:6px;
    padding:8px 12px;
    cursor:pointer;
    font-size:14px;
}
.mode-panel button:hover {
    background:#222;
}
.mode-panel .disturbance-value {
    color:#ddd;
    font-size:13px;
}
</style>
</head>

<body>

<h1 class="headline">Inverted Pendulum Identification and Contorl</h1>
<div class="app-layout">
    <div id="renderPanel" class="panel">
        <div id="thetaLabel" class="label"></div>
        <div id="alphaLabel" class="label"></div>
    </div>
    <div class="panel">
        <canvas id="phaseCanvas"></canvas>
    </div>
</div>
<div class="mode-panel">
    <button id="offControlButton" type="button">Turn off Control</button>
    <button id="disturbButton" type="button">Disturbe</button>
    <button id="trackingButton" type="button">Square Wave Tracking</button>
    <div id="disturbanceValue" class="disturbance-value">last kick: 0.00 rad/s</div>
</div>

<script>
// simulation
// =====================
// BASIC SETUP
// =====================
const scene = new THREE.Scene();


const camera = new THREE.PerspectiveCamera(60, window.innerWidth/window.innerHeight, 0.1, 100);
camera.position.set(2,2,1.5);
camera.lookAt(0,0,0);

const renderPanel = document.getElementById("renderPanel");
const phaseCanvas = document.getElementById("phaseCanvas");
const phaseCtx = phaseCanvas.getContext("2d");

const renderer = new THREE.WebGLRenderer({antialias:true});

camera.aspect = renderPanel.clientWidth / renderPanel.clientHeight;
camera.updateProjectionMatrix();
renderer.setSize(renderPanel.clientWidth, renderPanel.clientHeight);
renderer.setClearColor(0x000000);
renderPanel.appendChild(renderer.domElement);

const orbitTarget = new THREE.Vector3(0, 0.3, 0);
let orbitRadius = 3.8;
let orbitAzimuth = Math.atan2(camera.position.x - orbitTarget.x, camera.position.z - orbitTarget.z);
let orbitPolar = Math.acos((camera.position.y - orbitTarget.y) / orbitRadius);
let isOrbitDragging = false;
let lastPointerX = 0;
let lastPointerY = 0;

function updateOrbitCamera() {
    orbitPolar = Math.max(0.08, Math.min(Math.PI - 0.08, orbitPolar));
    orbitRadius = Math.max(1.5, Math.min(12, orbitRadius));

    const sinPolar = Math.sin(orbitPolar);
    camera.position.set(
        orbitTarget.x + orbitRadius * sinPolar * Math.sin(orbitAzimuth),
        orbitTarget.y + orbitRadius * Math.cos(orbitPolar),
        orbitTarget.z + orbitRadius * sinPolar * Math.cos(orbitAzimuth)
    );
    camera.lookAt(orbitTarget);
}

renderer.domElement.addEventListener('pointerdown', (event) => {
    if (event.button !== 0) {
        return;
    }
    isOrbitDragging = true;
    lastPointerX = event.clientX;
    lastPointerY = event.clientY;
    renderer.domElement.setPointerCapture(event.pointerId);
});

renderer.domElement.addEventListener('pointermove', (event) => {
    if (!isOrbitDragging) {
        return;
    }

    const dx = event.clientX - lastPointerX;
    const dy = event.clientY - lastPointerY;
    lastPointerX = event.clientX;
    lastPointerY = event.clientY;

    orbitAzimuth -= dx * 0.005;
    orbitPolar -= dy * 0.005;
    updateOrbitCamera();
});

function stopOrbitDrag(event) {
    if (!isOrbitDragging) {
        return;
    }
    isOrbitDragging = false;
    if (event && typeof event.pointerId === 'number') {
        renderer.domElement.releasePointerCapture(event.pointerId);
    }
}

renderer.domElement.addEventListener('pointerup', stopOrbitDrag);
renderer.domElement.addEventListener('pointercancel', stopOrbitDrag);

renderer.domElement.addEventListener('wheel', (event) => {
    event.preventDefault();
    const zoomFactor = 1 + event.deltaY * 0.0015;
    orbitRadius *= zoomFactor;
    updateOrbitCamera();
}, { passive: false });

updateOrbitCamera();


// =====================
// PARAMETERS
// =====================
const L0 = 1;
const L1 = 1;
const arcRadius = 0.4;
const origin = new THREE.Vector3(0,0,0);

// =====================
// DATA
// =====================
// const N = 300;
// const thetaFrames = Array.from({length:N}, (_,i)=>1.0*Math.sin(i*0.02));
// const alphaFrames = Array.from({length:N}, (_,i)=>0.8*Math.cos(i*0.02));

// =====================
// SAFE LINE CREATION
// =====================
function createLine(color, dashed=false){
    const geometry = new THREE.BufferGeometry();
    const positions = new Float32Array(6);
    geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));

    const material = dashed
        ? new THREE.LineDashedMaterial({color, dashSize:0.05, gapSize:0.03})
        : new THREE.LineBasicMaterial({color});

    const line = new THREE.Line(geometry, material);

    if(dashed){
        geometry.computeBoundingSphere();
        line.computeLineDistances();
    }

    return line;
}

function updateLine(line, a, b){
    const p = line.geometry.attributes.position.array;

    p[0]=a.x; p[1]=a.y; p[2]=a.z;
    p[3]=b.x; p[4]=b.y; p[5]=b.z;

    line.geometry.attributes.position.needsUpdate = true;

    if(line.material instanceof THREE.LineDashedMaterial){
        line.computeLineDistances();
    }
}

// =====================
// OBJECTS
// =====================
const arm = createLine(0x66ccff);
const pendulum = createLine(0x66ccff);
const vertical = createLine(0xffffff, true);
const horizontal = createLine(0xffffff, true);
const xAxis = createLine(0xffffff);
const yAxis = createLine(0xffffff);
const zAxis = createLine(0xffffff);

updateLine(horizontal, new THREE.Vector3(0,0,0), new THREE.Vector3(1,0,0));
updateLine(xAxis, origin, new THREE.Vector3(1, 0, 0));
updateLine(yAxis, origin, new THREE.Vector3(0, 1, 0));
updateLine(zAxis, origin, new THREE.Vector3(0, 0, -1));

scene.add(arm, pendulum, vertical, horizontal, xAxis, yAxis, zAxis);

// Example: place camera 3 units along x, 2 along y, 1.5 along z
camera.position.set(3, 2, -1);

// Make the camera look at the origin (0,0,0)
camera.lookAt(0, 0, 0);

// arcs (IMPORTANT: recreate geometry each frame → reliable)
let thetaArc = new THREE.Line(new THREE.BufferGeometry(), new THREE.LineDashedMaterial({color:0xffffff, dashSize:0.05, gapSize:0.03}));
let alphaArc = new THREE.Line(new THREE.BufferGeometry(), new THREE.LineDashedMaterial({color:0xffffff, dashSize:0.05, gapSize:0.03}));

scene.add(thetaArc, alphaArc);

// =====================
// GEOMETRY
// =====================
function compute(theta, alpha){
    const armEnd = new THREE.Vector3(
        L0*Math.cos(theta),
        0,
        L0*Math.sin(theta)
    );

    const dir = new THREE.Vector3(
        Math.sin(alpha)*Math.sin(theta),
        Math.cos(alpha),
        -Math.sin(alpha)*Math.cos(theta)
    );

    const pendulumEnd = armEnd.clone().addScaledVector(dir, L1);

    return {armEnd, pendulumEnd};
}

// =====================
// ARCS (ROBUST VERSION)
// =====================
function buildThetaArc(theta){
    const pts = [];
    for(let i=0;i<50;i++){
        const t = theta * i / 49;
        pts.push(new THREE.Vector3(
            arcRadius*Math.cos(t),
            0,
            arcRadius*Math.sin(t)
        ));
    }

    thetaArc.geometry.dispose();
    thetaArc.geometry = new THREE.BufferGeometry().setFromPoints(pts);
    thetaArc.computeLineDistances();
}

function buildAlphaArc(armEnd, theta, alpha){
    const pts = [];
    for(let i=0;i<50;i++){
        const a = alpha * i / 49;

        pts.push(new THREE.Vector3(
            armEnd.x + arcRadius*Math.sin(a)*Math.sin(theta),
            armEnd.y + arcRadius*Math.cos(a),
            armEnd.z - arcRadius*Math.sin(a)*Math.cos(theta)
        ));
    }

    alphaArc.geometry.dispose();
    alphaArc.geometry = new THREE.BufferGeometry().setFromPoints(pts);
    alphaArc.computeLineDistances();
}

// =====================
// LABELS
// =====================
const thetaDiv = document.getElementById("thetaLabel");
const alphaDiv = document.getElementById("alphaLabel");
const disturbButton = document.getElementById("disturbButton");
const offControlButton = document.getElementById("offControlButton");
const trackingButton = document.getElementById("trackingButton");
const disturbanceValue = document.getElementById("disturbanceValue");
let disturbanceTimer = null;
const DISTURBANCE_PERIOD_MS = 100;
const phaseHistory = [];
const MAX_PHASE_POINTS = 600;

katex.render("\\theta", thetaDiv);
katex.render("\\alpha", alphaDiv);

function gaussianRandom(mean = 0, sigma = 1) {
    const u1 = Math.max(Math.random(), 1e-12);
    const u2 = Math.random();
    const z0 = Math.sqrt(-2 * Math.log(u1)) * Math.cos(2 * Math.PI * u2);
    return mean + sigma * z0;
}

function injectDisturbance() {
    if (!qube) {
        console.warn('Simulation not available yet; disturbance skipped.');
        return;
    }

    const kick = gaussianRandom(0, 1);
    qube.x[1] += kick;
    disturbanceValue.textContent = `last kick: ${kick.toFixed(2)} rad/s`;
}

function startContinuousDisturbance() {
    injectDisturbance();
    if (disturbanceTimer !== null) {
        return;
    }

    disturbanceTimer = setInterval(() => {
        injectDisturbance();
    }, DISTURBANCE_PERIOD_MS);
}

function stopContinuousDisturbance() {
    if (disturbanceTimer === null) {
        return;
    }

    clearInterval(disturbanceTimer);
    disturbanceTimer = null;
}

disturbButton.addEventListener('pointerdown', (event) => {
    event.preventDefault();
    startContinuousDisturbance();
});

disturbButton.addEventListener('pointerup', stopContinuousDisturbance);
disturbButton.addEventListener('pointerleave', stopContinuousDisturbance);
disturbButton.addEventListener('pointercancel', stopContinuousDisturbance);
window.addEventListener('pointerup', stopContinuousDisturbance);
window.addEventListener('blur', stopContinuousDisturbance);

offControlButton.addEventListener('click', () => {
    if (!qube) {
        return;
    }

    qube.controlled = false;
    qube.tracking = null;
});

trackingButton.addEventListener('click', () => {
    if (!qube) {
        return;
    }

    qube.controlled = true;
    qube.tracking = 'square';
    qube.x = [0, 0, 0, 0];
    qube.xref = [0, 0, 0, 0];
});

function drawPhasePlot(theta, alpha) {
    phaseHistory.push({theta, alpha});
    if (phaseHistory.length > MAX_PHASE_POINTS) {
        phaseHistory.shift();
    }

    const dpr = window.devicePixelRatio || 1;
    const width = phaseCanvas.clientWidth;
    const height = phaseCanvas.clientHeight;
    if (phaseCanvas.width !== Math.floor(width * dpr) || phaseCanvas.height !== Math.floor(height * dpr)) {
        phaseCanvas.width = Math.floor(width * dpr);
        phaseCanvas.height = Math.floor(height * dpr);
    }

    phaseCtx.setTransform(dpr, 0, 0, dpr, 0, 0);
    phaseCtx.clearRect(0, 0, width, height);

    const pad = 36;
    const xMin = -0.8;
    const xMax = 0.8;
    const yMin = -1.4;
    const yMax = 1.4;

    const xScale = (width - 2 * pad) / (xMax - xMin);
    const yScale = (height - 2 * pad) / (yMax - yMin);
    const mapX = (x) => pad + (x - xMin) * xScale;
    const mapY = (y) => height - pad - (y - yMin) * yScale;

    phaseCtx.strokeStyle = "#666";
    phaseCtx.lineWidth = 1;
    phaseCtx.strokeRect(pad, pad, width - 2 * pad, height - 2 * pad);

    phaseCtx.strokeStyle = "#888";
    phaseCtx.beginPath();
    phaseCtx.moveTo(mapX(0), pad);
    phaseCtx.lineTo(mapX(0), height - pad);
    phaseCtx.moveTo(pad, mapY(0));
    phaseCtx.lineTo(width - pad, mapY(0));
    phaseCtx.stroke();

    phaseCtx.strokeStyle = "#66ccff";
    phaseCtx.lineWidth = 2;
    phaseCtx.beginPath();
    for (let i = 0; i < phaseHistory.length; i++) {
        const p = phaseHistory[i];
        const px = mapX(Math.max(xMin, Math.min(xMax, p.theta)));
        const py = mapY(Math.max(yMin, Math.min(yMax, p.alpha)));
        if (i === 0) {
            phaseCtx.moveTo(px, py);
        } else {
            phaseCtx.lineTo(px, py);
        }
    }
    phaseCtx.stroke();

    phaseCtx.fillStyle = "#fff";
    phaseCtx.font = "13px Arial";
    phaseCtx.fillText("theta", width / 2 - 18, height - 10);
    phaseCtx.save();
    phaseCtx.translate(14, height / 2 + 18);
    phaseCtx.rotate(-Math.PI / 2);
    phaseCtx.fillText("alpha", 0, 0);
    phaseCtx.restore();
}

function project(v){
    const p = v.clone().project(camera);
    return {
        x:(p.x*0.5+0.5)*window.innerWidth,
        y:(-p.y*0.5+0.5)*window.innerHeight
    };
}

// =====================
// ANIMATION
// =====================
let qube = null;
let tFallback = 0;

function animate(){
    requestAnimationFrame(animate);

    let theta = 0.1;
    let alpha = 0.1;

    // Use simulated state when dynamics are available.
    if (qube) {
        qube.step();
        const angles = qube.getAngles();
        theta = angles.theta;
        alpha = angles.alpha;
    } else {
        // Smooth fallback preview if dynamics are unavailable.
        tFallback += 0.02;
        theta = 0.35 * Math.sin(tFallback);
        alpha = 0.5 * Math.cos(0.8 * tFallback);
    }

    const {armEnd, pendulumEnd} = compute(theta, alpha);

    updateLine(arm, origin, armEnd);
    updateLine(pendulum, armEnd, pendulumEnd);

    // vertical reference
    updateLine(vertical, armEnd, armEnd.clone().add(new THREE.Vector3(0,1,0)));

    buildThetaArc(theta);
    buildAlphaArc(armEnd, theta, alpha);

    // labels
    const tPos = project(new THREE.Vector3(
        0.4*Math.cos(theta/2),
        0,
        0.4*Math.sin(theta/2)
    ));

    thetaDiv.style.left = tPos.x+"px";
    thetaDiv.style.top = tPos.y+"px";

    const aPos = project(new THREE.Vector3(
        armEnd.x + 0.5*Math.sin(alpha/2)*Math.sin(theta),
        armEnd.y + 0.5*Math.cos(alpha/2),
        armEnd.z - 0.5*Math.sin(alpha/2)*Math.cos(theta)
    ));

    alphaDiv.style.left = aPos.x+"px";
    alphaDiv.style.top = aPos.y+"px";

    drawPhasePlot(theta, alpha);

    renderer.render(scene, camera);

    //frame = (frame+1)%thetaFrames.length;
}

function startSimulation() {
    if (typeof Qube === 'undefined') {
        console.error('Qube dynamics did not load. Falling back to preview motion.');
        animate();
        return;
    }

    qube = new Qube({});

    // Start away from equilibrium so the simulation is immediately visible.
    qube.x = [0, 0, 0.6, 0.35];
    qube.xref = [0, 0, 0, 0];
    qube.controlled = true;
    qube.tracking = null;

    animate();
}

startSimulation();

// resize
window.addEventListener("resize", ()=>{
    camera.aspect = renderPanel.clientWidth/renderPanel.clientHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(renderPanel.clientWidth, renderPanel.clientHeight);
});
</script>

</body>
</html>
