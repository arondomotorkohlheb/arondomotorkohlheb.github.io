<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Interactive 3D Arm + Pendulum</title>

<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/examples/js/controls/OrbitControls.js"></script>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
<script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>

<style>
body { margin:0; overflow:hidden; background:black; }
.label { position:absolute; color:white; font-size:18px; pointer-events:none; }
</style>
</head>

<body>
<div id="thetaLabel" class="label"></div>
<div id="alphaLabel" class="label"></div>

<script>
// =====================
// PARAMETERS
// =====================
const L0 = 1, L1 = 1, arcRadius = 0.4;
const N = 300;
const thetaFrames = Array.from({length:N}, (_,i)=>1.0*Math.sin(i*0.02));
const alphaFrames = Array.from({length:N}, (_,i)=>0.8*Math.cos(i*0.02));

// =====================
// SCENE
// =====================
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(60, window.innerWidth/window.innerHeight, 0.1, 100);
camera.position.set(2,2,2);
camera.lookAt(0,0,0);

const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setClearColor(0x000000);
document.body.appendChild(renderer.domElement);

// =====================
// ORBIT CONTROLS
// =====================
const controls = new THREE.OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.05;

// =====================
// HELPER FUNCTIONS
// =====================
function createLine(color, dashed=false){
    const geom = new THREE.BufferGeometry();
    geom.setAttribute('position', new THREE.BufferAttribute(new Float32Array(6),3));
    const mat = dashed ? new THREE.LineDashedMaterial({color, dashSize:0.05, gapSize:0.03}) 
                       : new THREE.LineBasicMaterial({color});
    return new THREE.Line(geom, mat);
}

function updateLine(line, a, b){
    const p = line.geometry.attributes.position.array;
    p[0]=a.x; p[1]=a.y; p[2]=a.z;
    p[3]=b.x; p[4]=b.y; p[5]=b.z;
    line.geometry.attributes.position.needsUpdate = true;
    if(line.material instanceof THREE.LineDashedMaterial) line.computeLineDistances();
}

function remap(x,y,z){ return new THREE.Vector3(z,x,y); } // coordinate remap

function compute(theta, alpha){
    const armEnd = remap(L0*Math.cos(theta), L0*Math.sin(theta), 0);
    const dir = remap(Math.sin(alpha)*Math.sin(theta), -Math.sin(alpha)*Math.cos(theta), Math.cos(alpha));
    const pendulumEnd = armEnd.clone().addScaledVector(dir, L1);
    return {armEnd, pendulumEnd};
}

function buildArcLine(arc, pts){
    arc.geometry.dispose();
    arc.geometry = new THREE.BufferGeometry().setFromPoints(pts);
    if(arc.material instanceof THREE.LineDashedMaterial) arc.computeLineDistances();
}

// =====================
// OBJECTS
// =====================
const arm = createLine(0x66ccff);
const pendulum = createLine(0x66ccff);
const vertical = createLine(0xffffff, true);
const thetaArc = createLine(0xffffff,true);
const alphaArc = createLine(0xffffff,true);
scene.add(arm, pendulum, vertical, thetaArc, alphaArc);

// =====================
// LABELS
// =====================
const thetaDiv = document.getElementById("thetaLabel");
const alphaDiv = document.getElementById("alphaLabel");
katex.render("\\theta", thetaDiv);
katex.render("\\alpha", alphaDiv);

function project(v){
    const p = v.clone().project(camera);
    return {x:(p.x*0.5+0.5)*window.innerWidth, y:(-p.y*0.5+0.5)*window.innerHeight};
}

// =====================
// ANIMATION
// =====================
let frame=0;
function animate(){
    requestAnimationFrame(animate);

    const theta = thetaFrames[frame];
    const alpha = alphaFrames[frame];
    const origin = new THREE.Vector3(0,0,0);
    const {armEnd, pendulumEnd} = compute(theta, alpha);

    updateLine(arm, origin, armEnd);
    updateLine(pendulum, armEnd, pendulumEnd);
    updateLine(vertical, armEnd, armEnd.clone().add(new THREE.Vector3(0,1,0)));

    // theta arc
    let ptsT=[];
    for(let i=0;i<50;i++){ const t=theta*i/49; ptsT.push(remap(arcRadius*Math.cos(t), arcRadius*Math.sin(t),0)); }
    buildArcLine(thetaArc, ptsT);

    // alpha arc
    let ptsA=[];
    for(let i=0;i<50;i++){ const a=alpha*i/49; 
        ptsA.push(remap(
            armEnd.x + arcRadius*Math.sin(a)*Math.sin(theta),
            armEnd.y - arcRadius*Math.sin(a)*Math.cos(theta),
            armEnd.z + arcRadius*Math.cos(a)
        ));
    }
    buildArcLine(alphaArc, ptsA);

    // update labels
    const tPos = project(remap(0.6*Math.cos(theta/2), 0.6*Math.sin(theta/2),0));
    thetaDiv.style.left = tPos.x+"px";
    thetaDiv.style.top = tPos.y+"px";

    const aPos = project(remap(
        armEnd.x + 0.5*Math.sin(alpha/2)*Math.sin(theta),
        armEnd.y - 0.5*Math.sin(alpha/2)*Math.cos(theta),
        armEnd.z + 0.5*Math.cos(alpha/2)
    ));
    alphaDiv.style.left = aPos.x+"px";
    alphaDiv.style.top = aPos.y+"px";

    controls.update();
    renderer.render(scene,camera);
    frame=(frame+1)%thetaFrames.length;
}
animate();

// =====================
// RESIZE
// =====================
window.addEventListener("resize", ()=>{
    camera.aspect = window.innerWidth/window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
</html>
