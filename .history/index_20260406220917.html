<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>3D Arm + Pendulum (Three.js)</title>
<style>
    body { margin: 0; background: black; overflow: hidden; }
</style>
</head>

<body>

<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>

<script>
// =====================
// PARAMETERS
// =====================
const L0 = 1;
const L1 = 1;

// =====================
// TEST DATA (REPLACE)
// =====================
const N = 300;
const thetaFrames = Array.from({length: N}, (_, i) => 0.8 * Math.sin(i * 0.03));
const alphaFrames = Array.from({length: N}, (_, i) => 0.6 * Math.cos(i * 0.03));

// =====================
// SCENE SETUP
// =====================
const scene = new THREE.Scene();

const camera = new THREE.PerspectiveCamera(
    60,
    window.innerWidth / window.innerHeight,
    0.1,
    100
);
camera.position.set(2, 1, 1);
camera.lookAt(0, 0, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setClearColor(0x000000);
document.body.appendChild(renderer.domElement);

// =====================
// AXES
// =====================
function makeAxis(dir) {
    const geometry = new THREE.BufferGeometry();
    const vertices = new Float32Array([
        0, 0, 0,
        dir.x, dir.y, dir.z
    ]);
    geometry.setAttribute('position', new THREE.BufferAttribute(vertices, 3));
    return new THREE.Line(geometry, new THREE.LineBasicMaterial({ color: 0xffffff }));
}

scene.add(makeAxis(new THREE.Vector3(1,0,0)));
scene.add(makeAxis(new THREE.Vector3(0,1,0)));
scene.add(makeAxis(new THREE.Vector3(0,0,1)));

// =====================
// ARM + PENDULUM (IMPORTANT FIX HERE)
// =====================
function createLine(color) {
    const geometry = new THREE.BufferGeometry();
    const vertices = new Float32Array(6); // 2 points * 3 coords
    geometry.setAttribute('position', new THREE.BufferAttribute(vertices, 3));

    const material = new THREE.LineBasicMaterial({ color });
    return new THREE.Line(geometry, material);
}

const arm = createLine(0x66ccff);
const pendulum = createLine(0x66ccff);

scene.add(arm);
scene.add(pendulum);

// =====================
// GEOMETRY FUNCTION
// =====================
function calculatePs(theta, s, alpha) {
    return [
        L0*Math.cos(theta) + s*Math.sin(alpha)*Math.sin(theta),
        L0*Math.sin(theta) - s*Math.sin(alpha)*Math.cos(theta),
        s*Math.cos(alpha)
    ];
}

// =====================
// UPDATE LINE (CRITICAL FIX)
// =====================
function updateLine(line, p1, p2) {
    const pos = line.geometry.attributes.position.array;

    pos[0] = p1[0];
    pos[1] = p1[1];
    pos[2] = p1[2];

    pos[3] = p2[0];
    pos[4] = p2[1];
    pos[5] = p2[2];

    line.geometry.attributes.position.needsUpdate = true;
}

// =====================
// ANIMATION LOOP
// =====================
let frame = 0;

function animate() {
    requestAnimationFrame(animate);

    const theta = thetaFrames[frame];
    const alpha = alphaFrames[frame];

    const origin = [0,0,0];
    const armEnd = calculatePs(theta, 0, alpha);
    const pendulumEnd = calculatePs(theta, L1, alpha);

    updateLine(arm, origin, armEnd);
    updateLine(pendulum, armEnd, pendulumEnd);

    renderer.render(scene, camera);

    frame = (frame + 1) % thetaFrames.length;
}

animate();

// =====================
// RESIZE HANDLING
// =====================
window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>

</body>
</html>
